[prep]
filters = ['F555W', 'F814W', 'F090W', 'F150W', 'F160W', 'F277W']
PSF_file = '../sample_data/psf_data.h5'
blur_psf = {}                          # empty: calibrator bootstrap picks per-filter blur
custom_initial_crop = 1
sigma_guess = 10
auto_crop = true
auto_crop_factor = 8                   # cutout half-axis in σ of best-fit Gaussian

[core]
base_filter = 'F150W'
iter_basefit = 20
iter_scalefit = 10
fit_complex_model = false
allow_refit = false
mainloop_convergence_atol = 1e-3       # stop when |Δ standardized sersic params| < atol
mainloop_convergence_patience = 2      # consecutive within-atol iters required to early-stop
mainloop_min_iter = 2                  # never early-stop before this many iters
use_dual_annealing = true              # iter-1 main-loop sersic fit: short iNM -> scipy.dual_annealing (escape false basins)
use_final_polish = true                # post-mainloop L-BFGS-B polish on the final sersic params

[psf-calib]
in_mainloop = true                     # enable per-iter kernel recalibration
kernel_family = 'gaussian'             # 'gaussian' | 'moffat' | 'drizzle'
kernel_anchor_K = 30
kernel_fit_skip_on_convergence = false
kernel_skip_threshold = 1e-3

kernel_fit_objective = 'multi_source'      # 'multi_source' | 'single_source'
kernel_fit_stamp_half_min = 8
kernel_fit_stamp_half_in_sigmaeff = 3.0
kernel_fit_max_neighbors = 15
kernel_fit_neighbor_pad_pix = 4.0
center_mask_r_in_fwhm = 2.5                # calibration centre mask radius (× empirical effective PSF FWHM); 0 disables

# fwhm scan: switch to NNLS forced photometry + sum_snr ranking + top-100 cap
# (variant L from the prototype). scan_metric='resid_mad' for variant J.
scan_method = 'nnls'
scan_metric = 'sum_snr'
scan_top_k = 100

# 'scan' = bracket scan (uses scan_method/scan_metric/scan_top_k)
# 'empirical' = skip scan; factor = fit_fwhm(cd.psf) / psf_sigma
fwhm_method = 'empirical'

[psf]
th_min = 1
th_max = 30
th_iter = 10                           # threshold ladder steps
th_max_consec_empty = 3                # early-stop ladder after N empty passes
bkg_refit_per_iteration = true         # re-estimate bkg_std after each successful pass
bkg_floor_factor = 0.3                 # floor on re-estimated bkg_std (fraction of initial)
ladder_dedup_psfsigma = 0.5            # in-ladder duplicate cut (× psf_sigma); 0 disables

final_refit_method = 'nnls'            # 'iterative' | 'nnls' | 'none'

# 'iterative' refit (used when final_refit_method='iterative')
final_joint_refit = true
final_refit_xy_bounds = 0.0
final_refit_iterations = 5
final_refit_detect_th = 4.0
final_refit_dedup_psfsigma = 2.0
final_refit_residual_tol = 0.01
final_refit_catastrophic_flux_factor = 20.0
final_refit_fit_shape = [11, 11]

# 'nnls' refit + post-NNLS find_peaks leftover loop
leftover_max_iterations = 3            # 0 disables
leftover_detect_k_sigma = 5.0
leftover_dedup_psfsigma = 1.5
leftover_box_size = 3

mask_aper_size_in_r_eff = 3.5          # sky-mask aperture size (× r_eff)
raise_error = false
residual_clip_sigma = 15.0             # high to avoid over-masking

finder_kwargs = {roundness_range=[-1.0, 1.0], sharpness_range=[0.20, 1.0]}
grouper_separation_in_psfsigma = 2
bkg_sigma_clip = 3.0
bkg_box_size = [10, 10]
bkg_filter_size = [5, 5]
localbkg_bounds_in_psfsigma = [2, 5]

center_mask_r_in_fwhm = 1.5            # iPSF centre mask radius (× empirical effective PSF FWHM); 0 disables

PSFPhotometry_aperture_radius = 3
PSFPhotometry_fitter_maxiters = 300
PSFPhotometry_fit_shape_in_fwhm = 1.5  # n = max(3, next_odd(2.355·psf_sigma·frac))
modelimg_render_shape = [25, 25]
PSFPhotometry_group_warning_threshold = 10

# Quality cuts
cuts_pos_err_max = 2
cuts_res_cen_sigma_clip = 3.0
cuts_cfit_sigma_clip = 3.0
cuts_chi2dof_median_factor = 3.0
cuts_pos_diff_median_factor = 3.0
cuts_flux_SNR_min = 1.0

[aperture]
petro = 0.5
center_mask = 4.0                      # aperture-photometry centre mask
plot = true
isophot_base_filter = 'F150W'
isophot_frac_min = 0.05
isophot_frac_max = 0.95
fit_isophot_to = 'sersic_modelimg'
measure_on = 'psf_sub_data'
error_on = 'psf_sub_data_error'
measure_sky_on = 'residual_masked'
fill_max_nan_frac = 0.7
fill_replace_with = 'median'           # alternative: 'sersic_modelimg'
PSF_corr_base_filter = 'F090W'
