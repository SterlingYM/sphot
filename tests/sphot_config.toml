[prep]
filters = ['F555W', 'F814W', 'F090W', 'F150W', 'F160W', 'F277W']
PSF_file = '../sample_data/psf_data.h5'
blur_psf = {F555W = 4, F814W = 5, F090W = 3.8, F150W = 3.8, F160W = 9, F277W = 9}
custom_initial_crop = 1
sigma_guess = 10
auto_crop = true
auto_crop_factor = 8 # size of each axis in units of STD of best-fit Gaussian

[core]
base_filter = 'F150W'
iter_basefit = 10
iter_scalefit = 5
fit_complex_model = false
allow_refit = false
# Main-loop early-exit: stop iterating when sersic params (standardized [0,1]
# parameter vector) move by less than mainloop_convergence_atol for
# mainloop_convergence_patience consecutive iterations, but never before
# mainloop_min_iter. Set patience very high to disable.
mainloop_convergence_atol = 1e-3
mainloop_convergence_patience = 2
mainloop_min_iter = 2

[psf]
# iterative fit settings
th_min = 1
th_max = 30
th_iter = 10 # N_iteration between min and max
# Early-stop the threshold sweep after this many consecutive thresholds add
# no new sources. Set very high to disable.
th_max_consec_empty = 3
# After each successful threshold pass, re-estimate bkg_std from the cleaned
# residual. In crowded fields the initial noise estimate is dominated by the
# unresolved-star carpet, so subsequent thresholds can ratchet down as
# sources are subtracted, exposing dim stars buried in the apparent noise.
bkg_refit_per_iteration = true
# Floor on the re-estimated bkg_std as a fraction of the initial value.
# Prevents thresholds from collapsing if the residual happens to look very
# clean over a small box (e.g. one well-fit bright source).
bkg_floor_factor = 0.3
# Final refit method. 'iterative' (legacy LM + leftover-detection) or
# 'perbin_nnls' (per-bin extra-blur + non-negative least-squares).
# 'perbin_nnls' was selected from the proto_08 experiment: lower MAD,
# no negative-flux outputs, deterministic, runs in seconds.
final_refit_method = 'perbin_nnls'

# --- perbin_nnls knobs ---
perbin_flux_percentiles = [33.0, 67.0]      # 3 bins: dim / mid / bright
perbin_extra_blurs = [0.0, 1.0, 2.0, 3.0, 4.0]

# --- iterative (legacy) knobs (still honoured if final_refit_method='iterative') ---
final_joint_refit = true
final_refit_xy_bounds = 0.0
final_refit_iterations = 5
final_refit_detect_th = 4.0
final_refit_dedup_psfsigma = 2.0
final_refit_residual_tol = 0.01
final_refit_catastrophic_flux_factor = 20.0
final_refit_fit_shape = [11, 11]
mask_aper_size_in_r_eff = 3.5
raise_error = false
residual_clip_sigma = 15.0 # keep this high to avoid over-masking

# Posterior blur calibration: after the main threshold ladder, each
# PSFFitter.fit() re-fits the K brightest quality-passing sources with the
# PSF rebuilt at a 4-point symmetric additive bracket
#   [current - Δ, current - Δ/3, current + Δ/3, current + Δ]
# and picks the vertex of a least-squares quadratic fit through the
# (cfit+qfit) metric. With 4 samples np.polyfit averages out per-pixel
# noise. Δ is an adaptive step (in pixels) tracked across fit() calls: it
# grows when the bracket's minimum lands at an edge (too narrow), shrinks
# when it lands at the interior (converging).
psf_blur_initial_delta = 0.3 # starting Δ in pixels
psf_blur_min_delta = 0.05    # never search finer than this
psf_blur_max_delta = 2.0     # never search wider than this
# Number of brightest quality-passing sources to re-fit per candidate.
# Smaller = faster calibration but noisier metric.
psf_blur_calib_K = 30
# Skip calibration when fewer than this many sources pass the quality cuts.
psf_blur_calib_min_sources = 3
# Require the grid minimum's (cfit+qfit) score to beat the current blur's
# score by at least this relative amount before switching. Prevents
# noise-driven oscillation when the metric is flat. 0.05 = 5% improvement.
psf_blur_improvement_tol = 0.05
# After this many consecutive fit() calls where the calibration returns the
# same blur, skip further calibrations until cutoutdata.psf_blurring is
# externally reset. Set very high to always recalibrate.
psf_blur_stable_after = 2

# finder/grouper/bkg parameters
finder_kwargs = {roundness_range=[-1.0, 1.0], sharpness_range=[0.20, 1.0]}
grouper_separation_in_psfsigma = 2
bkg_sigma_clip = 3.0
bkg_box_size = [10,10]
bkg_filter_size = [5,5]
localbkg_bounds_in_psfsigma = [2,5]

# Photutils PSFPhotometry parameters
PSFPhotometry_aperture_radius = 3
PSFPhotometry_fitter_maxiters = 300
PSFPhotometry_fit_shape = [3,3] # pixels. use small number for crowded fields
modelimg_render_shape = [25,25]
PSFPhotometry_group_warning_threshold = 10

# quality cuts
cuts_pos_err_max = 2 # pixels in fitted coordinates
cuts_res_cen_sigma_clip = 3.0 # -N*bkg_std < res_cen < max(N*std(res_cen), N*bkg_std)
cuts_cfit_sigma_clip = 3.0 # N-sigma for cfit
# cuts_qfit_median_factor = 2.0 # max_qfit/median(qfit)
cuts_chi2dof_median_factor = 3.0 # max_chi2dof/median(chi2dof)
cuts_pos_diff_median_factor = 3.0 # max_pos_diff/median(pos_diff)
cuts_flux_SNR_min = 1.0 # min flux_SNR

[aperture]
petro = 0.5
center_mask=4.0
plot=true
isophot_base_filter = 'F150W'
isophot_frac_min = 0.05
isophot_frac_max = 0.95
fit_isophot_to='sersic_modelimg'
measure_on = 'psf_sub_data'
error_on = 'psf_sub_data_error'
measure_sky_on='residual_masked'
fill_max_nan_frac=0.7
fill_replace_with='median'#'sersic_modelimg'
PSF_corr_base_filter='F090W'
